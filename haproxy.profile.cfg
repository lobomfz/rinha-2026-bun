global
  log stdout format raw local0
  maxconn 4096
  nbthread 1
  tune.bufsize 4096
  tune.maxrewrite 0

defaults
  mode tcp
  log global
  log-format "Tw=%Tw Tc=%Tc Tt=%Tt ac=%ac fc=%fc bc=%bc sc=%sc be=%b/%s"
  timeout connect 500ms
  timeout client 10s
  timeout server 10s

frontend api
  bind *:9999
  default_backend apis

backend apis
  balance roundrobin
  server api1 /sockets/api1.sock
  server api2 /sockets/api2.sock
